spring.application.name=smart_campus

# Database (H2 file-based for persistence during development)
spring.datasource.url=jdbc:h2:file:./data/smartcampusdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads

# JWT
app.jwt.secret=${JWT_SECRET:local-dev-secret-key-that-is-at-least-32-chars-long}
app.jwt.expiration=86400000

# OAuth2 Google (set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars for real OAuth2 login)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-local-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-local-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server
server.port=8080
