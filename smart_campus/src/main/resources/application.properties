spring.application.name=smart_campus

# Database (H2 In-Memory)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/smartcampusdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=5631#$%Ap
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads

# JWT
app.jwt.secret=${JWT_SECRET:local-dev-secret-key-for-development}
app.jwt.expiration=86400000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Frontend URL (used for OAuth2 redirect)
app.frontend.url=http://localhost:5173

# Server
server.port=8081
