spring.application.name=smart_campus

# ==================== DATABASE ====================
spring.jpa.hibernate.ddl-auto=update

# MySQL (Active)
spring.datasource.url=jdbc:mysql://localhost:3306/smartCampusDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:5631#$%Ap}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 In-Memory (Commented out — use for local dev/testing only)
# spring.datasource.url=jdbc:h2:mem:smartCampusDB;DB_CLOSE_DELAY=-1
# spring.datasource.username=sa
# spring.datasource.password=
# spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 Console (only useful when H2 is active)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.h2.console.settings.web-allow-others=true

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:MyVerySecureJWTSecretKeyForSmartCampusOperationsHub2026}
app.jwt.expiration=86400000

# ==================== OAuth2 Google ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# ==================== CORS ====================
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

# ==================== SERVER ====================
server.port=8081