spring.application.name=smart_campus

# Database (H2 In-Memory)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:h2:mem:smartCampusDB;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads

# JWT
app.jwt.secret=s3cr3t_sm4rt_c4mpus_hub_jwt_k3y_2026_v1
app.jwt.expiration=86400000

# OAuth2 Google
# Replace with your actual credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server
server.port=8080
